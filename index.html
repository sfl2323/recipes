<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharon's Recipe Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Tenor+Sans&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #3d6b52;
    --green-light: #eef3f0;
    --green-mid: #c2d4ca;
    --cream: #faf9f6;
    --text: #1e2a23;
    --muted: #7a9485;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--text);
    font-family: 'Tenor Sans', sans-serif;
    font-weight: 400;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--green);
    color: white;
    text-align: center;
    padding: 56px 24px 40px;
    position: relative;
  }
  header::after {
    content: '';
    display: block;
    width: 60px;
    height: 1px;
    background: rgba(255,255,255,0.4);
    margin: 20px auto 0;
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.2rem, 6vw, 3.8rem);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  header p {
    margin-top: 10px;
    font-size: 0.78rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.65;
  }

  /* SEARCH + FILTER */
  .controls {
    max-width: 860px;
    margin: 36px auto 0;
    padding: 0 20px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }

  .search-wrap {
    flex: 1;
    min-width: 220px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    width: 16px;
    height: 16px;
  }
  #search {
    width: 100%;
    padding: 11px 16px 11px 40px;
    border: 1.5px solid var(--green-mid);
    border-radius: 4px;
    background: white;
    font-family: 'Tenor Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--green); }
  #search::placeholder { color: var(--muted); }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .filter-btn {
    padding: 8px 16px;
    border: 1.5px solid var(--green-mid);
    border-radius: 4px;
    background: white;
    font-family: 'Tenor Sans', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }

  /* RESULTS COUNT */
  .results-count {
    max-width: 860px;
    margin: 20px auto 4px;
    padding: 0 20px;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* GRID */
  .grid {
    max-width: 860px;
    margin: 0 auto;
    padding: 20px 20px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1px;
    background: var(--green-mid);
    border: 1px solid var(--green-mid);
  }

  /* CARD */
  .card {
    background: var(--cream);
    padding: 28px 24px 24px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .card:hover { background: white; }
  .card-tag {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 1.45rem;
    line-height: 1.2;
    color: var(--green);
    margin-bottom: 10px;
  }
  .card-preview {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-arrow {
    position: absolute;
    bottom: 20px;
    right: 20px;
    color: var(--green-mid);
    font-size: 1rem;
    transition: transform 0.2s, color 0.2s;
  }
  .card:hover .card-arrow { transform: translateX(3px); color: var(--green); }

  .no-results {
    background: var(--cream);
    padding: 60px 24px;
    text-align: center;
    grid-column: 1/-1;
    color: var(--muted);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-style: italic;
  }

  /* MODAL */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(30,42,35,0.55);
    z-index: 100;
    backdrop-filter: blur(2px);
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--cream);
    max-width: 600px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    border-top: 4px solid var(--green);
    position: relative;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .modal-header {
    padding: 32px 32px 20px;
    border-bottom: 1px solid var(--green-mid);
  }
  .modal-tag {
    font-size: 0.65rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(1.8rem, 5vw, 2.5rem);
    color: var(--green);
    line-height: 1.1;
  }

  .modal-body { padding: 24px 32px 36px; }

  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--green);
    font-weight: 500;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--green-mid);
  }

  .ingredients-list {
    list-style: none;
    margin-bottom: 28px;
  }
  .ingredients-list li {
    font-size: 0.85rem;
    padding: 5px 0;
    border-bottom: 1px solid var(--green-light);
    display: flex;
    align-items: baseline;
    gap: 8px;
    line-height: 1.5;
  }
  .ingredients-list li::before {
    content: '—';
    color: var(--green-mid);
    font-size: 0.7rem;
    flex-shrink: 0;
  }

  .ingredient-group-label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--green);
    margin: 14px 0 6px;
    font-weight: 500;
  }

  .instructions-list {
    list-style: none;
    counter-reset: steps;
  }
  .instructions-list li {
    counter-increment: steps;
    display: flex;
    gap: 14px;
    margin-bottom: 14px;
    font-size: 0.87rem;
    line-height: 1.65;
  }
  .instructions-list li::before {
    content: counter(steps);
    background: var(--green);
    color: white;
    font-size: 0.65rem;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
    font-family: 'Tenor Sans', sans-serif;
    font-weight: 500;
  }

  .modal-note {
    margin-top: 20px;
    padding: 14px 16px;
    background: var(--green-light);
    border-left: 2px solid var(--green);
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.6;

  .modal-note a { color: var(--green); }

  .close-btn {
    position: absolute;
    top: 16px;
    right: 18px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 1.4rem;
    line-height: 1;
    padding: 4px 8px;
    transition: color 0.2s;
  }
  .close-btn:hover { color: var(--green); }

  footer {
    text-align: center;
    padding: 20px;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--green-mid);
  }
</style>
</head>

      <p style="font-size:0.75rem;color:#7a9485;margin-bottom:8px;">Use a 2oz cup. Put the sample amount below in the cup, mark the level, and watch for the rise.</p>
      <table style="width:100%;border-collapse:collapse;font-size:0.78rem;">
        <thead>
          <tr style="background:#3d6b52;color:white;">
            <th style="padding:5px 8px;text-align:left;font-weight:400;letter-spacing:0.05em;">Dough Temp</th>
            <th style="padding:5px 8px;text-align:left;font-weight:400;letter-spacing:0.05em;">% Rise</th>
            <th style="padding:5px 8px;text-align:left;font-weight:400;letter-spacing:0.05em;">Sample Size</th>
          </tr>
        </thead>
        <tbody>
          ${[
            ['78–80F/27C','30%','43g'],['75F/24C','50%','37g'],['70F/21C','75%','32g'],['65F/18C','100%','28g']
          ].map((r,i) => `<tr style="background:${i%2===0?'#faf9f6':'#eef3f0'}"><td style="padding:4px 8px;">${r[0]}</td><td style="padding:4px 8px;">${r[1]}</td><td style="padding:4px 8px;">${r[2]}</td></tr>`).join('')}
        </tbody>
      </table>
      <p style="font-size:0.65rem;color:#7a9485;margin-top:4px;">Source: @crustycravingsbyhannah</p>
    </div>
  </div>
</div>`
  },
  {
    id: 41,
    title: "Oatmeal Cookies",
    tag: "Other · Baking",
    category: "Other",
    preview: "Soft oatmeal cookies — via AllRecipes",
    ingredientGroups: [],
    steps: [],
    note: 'Recipe from AllRecipes: <a href="https://www.allrecipes.com/recipe/19247/soft-oatmeal-cookies/" target="_blank">Soft Oatmeal Cookies</a>'
  }
];

// --- RENDER ---
const grid = document.getElementById('grid');
const overlay = document.getElementById('overlay');
const modal = document.getElementById('modal');
const closeBtn = document.getElementById('closeBtn');
const searchInput = document.getElementById('search');
const filterBtns = document.querySelectorAll('.filter-btn');
const resultsCount = document.getElementById('resultsCount');

let activeFilter = 'all';
let searchTerm = '';

function renderCards() {
  const term = searchTerm.toLowerCase();
  const filtered = recipes.filter(r => {
    const matchesFilter = activeFilter === 'all' || r.category === activeFilter;
    const matchesSearch = !term ||
      r.title.toLowerCase().includes(term) ||
      r.tag.toLowerCase().includes(term) ||
      r.preview.toLowerCase().includes(term) ||
      r.ingredientGroups.some(g => g.items.some(i => i.toLowerCase().includes(term)));
    return matchesFilter && matchesSearch;
  });

  resultsCount.textContent = `${filtered.length} recipe${filtered.length !== 1 ? 's' : ''}`;

  grid.innerHTML = '';
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">No recipes found.</div>';
    return;
  }
  filtered.forEach(r => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-tag">${r.tag}</div>
      <div class="card-title">${r.title}</div>
      <div class="card-preview">${r.preview}</div>
      <span class="card-arrow">→</span>
    `;
    card.addEventListener('click', () => openModal(r));
    grid.appendChild(card);
  });
}

function openModal(r) {
  document.getElementById('modalTag').textContent = r.tag;
  document.getElementById('modalTitle').textContent = r.title;

  let html = '';

  // Ingredients
  if (r.ingredientGroups && r.ingredientGroups.length > 0) {
    html += `<p class="section-label">Ingredients</p>`;
    r.ingredientGroups.forEach(g => {
      if (g.label) html += `<p class="ingredient-group-label">${g.label}</p>`;
      html += '<ul class="ingredients-list">';
      g.items.forEach(i => { html += `<li>${i}</li>`; });
      html += '</ul>';
    });
  }

  // Steps
  if (r.steps && r.steps.length > 0) {
    html += `<p class="section-label">Instructions</p>`;
    html += '<ol class="instructions-list">';
    r.steps.forEach(s => { html += `<li>${s}</li>`; });
    html += '</ol>';
  }

  // Note
  if (r.note) {
    html += `<div class="modal-note">${r.note}</div>`;
  }

  document.getElementById('modalBody').innerHTML = html;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

closeBtn.addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderCards();
  });
});

searchInput.addEventListener('input', e => {
  searchTerm = e.target.value;
  renderCards();
});

renderCards();
</script>
</body>
</html>
